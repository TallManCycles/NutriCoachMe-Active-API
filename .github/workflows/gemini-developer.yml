name: Gemini Code Generation
on:
  issue_comment:
    types: [created]

jobs:
  generate-code:
    if: contains(github.event.comment.body, '/gemini-run')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: '20'

      - name: Install dependencies
        run: npm install @google/generative-ai

      - name: Run Gemini Code Generator
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          cat << 'EOF' > gemini-implement.js
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require('fs');
          const path = require('path');

          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
          const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

          async function run() {
            try {
              // Recursively find files, excluding hidden/node_modules
              const files = fs.readdirSync('.', { recursive: true })
                .filter(f => !f.includes('node_modules') && !f.includes('.git') && fs.statSync(f).isFile());
          
              let codebaseContext = "";
              for (const f of files) {
                const content = fs.readFileSync(f, 'utf8');
                codebaseContext += `\n--- FILE: ${f} ---\n${content}\n`;
              }

              const prompt = `SYSTEM: Expert Node.js developer. Implement feature. Return ONLY JSON.
                CONTEXT: ${codebaseContext}
                REQUEST:
                Title: ${process.env.ISSUE_TITLE}
                Body: ${process.env.ISSUE_BODY}
                Comment: ${process.env.COMMENT_BODY}
                FORMAT: { "files": [ { "path": "string", "content": "string" } ] }`;

              const result = await model.generateContent(prompt);
              const response = await result.response;
              const text = response.text();
              const jsonMatch = text.match(/\{[\s\S]*\}/);
          
              if (!jsonMatch) throw new Error("No JSON found");
          
              const data = JSON.parse(jsonMatch[0]);
              for (const file of data.files) {
                const dir = path.dirname(file.path);
                if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
                fs.writeFileSync(file.path, file.content);
                console.log("Updated:", file.path);
              }
            } catch (error) {
              console.error(error);
              process.exit(1);
            }
          }
          run();
          EOF
          node gemini-implement.js